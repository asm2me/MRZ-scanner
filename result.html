<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MRZ Result</title>
    <style>
        body { font-family: sans-serif; padding: 2rem; }
        label { display: block; margin-top: 1rem; }
        input { width: 100%; padding: .5rem; }
    </style>
</head>
<body>
    <h1>Passport Information</h1>
    <form id="infoForm">
        <label>Document type: <input name="documentCode" readonly /></label>
        <label>Issuing country: <input name="issuingState" readonly /></label>
        <label>Last name: <input name="lastName" readonly /></label>
        <label>Given names: <input name="firstName" readonly /></label>
        <label>Passport number: <input name="documentNumber" readonly /></label>
        <label>Nationality: <input name="nationality" readonly /></label>
        <label>Date of birth: <input name="birthDate" readonly /></label>
        <label>Sex: <input name="sex" readonly /></label>
        <label>Expiration date: <input name="expirationDate" readonly /></label>
        <label>Personal number: <input name="personalNumber" readonly /></label>
    </form>
    <script>
        function populate() {
            const form = document.getElementById('infoForm');
            // sessionStorage is preferred — serve's clean-URL 301 redirect strips query params
            let data = {};
            try {
                const stored = sessionStorage.getItem('mrzData');
                if (stored) { data = JSON.parse(stored); sessionStorage.removeItem('mrzData'); }
            } catch(e) {}
            // Fall back to URL query params (works with python -m http.server etc.)
            if (!Object.keys(data).length) {
                for (const [k, v] of new URLSearchParams(window.location.search).entries()) data[k] = v;
            }
            for (const [key, value] of Object.entries(data)) {
                const input = form.elements[key];
                if (input) input.value = value;
            }
        }
        populate();
    </script>
</body>
</html>
