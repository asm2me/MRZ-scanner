<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MRZ Webcam Scanner</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem;
            background: #111827;
            color: #e5e7eb;
            min-height: 100vh;
        }
        h1 { font-size: 1.4rem; margin-bottom: 1rem; letter-spacing: 0.05em; color: #f9fafb; }
        #video-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 0 2px #374151;
        }
        #video { width: 100%; display: block; }
        #overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }
        #message {
            margin-top: 1rem;
            font-size: 0.95rem;
            padding: 0.45rem 1rem;
            background: rgba(0,0,0,0.45);
            border-radius: 6px;
            border: 1px solid #374151;
            min-width: 260px;
            text-align: center;
        }
        #focus-controls {
            display: none;
            flex-direction: column;
            gap: 0.55rem;
            margin-top: 0.75rem;
            padding: 0.7rem 1rem;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            width: 100%;
            max-width: 640px;
        }
        .focus-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.88rem;
            color: #9ca3af;
        }
        .focus-row label { min-width: 5.5rem; color: #d1d5db; }
        #focus-mode-select {
            padding: 0.3rem 0.6rem;
            border-radius: 5px;
            border: 1px solid #4b5563;
            background: #111827;
            color: #e5e7eb;
            font-size: 0.88rem;
            cursor: pointer;
        }
        #focus-range {
            flex: 1;
            accent-color: #00b4ff;
            cursor: pointer;
        }
        #focus-val {
            min-width: 3rem;
            text-align: right;
            font-variant-numeric: tabular-nums;
            color: #7dd3fc;
        }
        #perm-tip {
            display: none;
            margin-top: 0.6rem;
            padding: 0.5rem 0.85rem;
            background: #1c3b2e;
            border: 1px solid #166534;
            border-radius: 6px;
            font-size: 0.82rem;
            color: #86efac;
            max-width: 640px;
            width: 100%;
        }
        #debug-section {
            margin-top: 0.75rem;
            width: 100%;
            max-width: 640px;
            font-size: 0.82rem;
            color: #6b7280;
        }
        #debug-section summary {
            cursor: pointer;
            padding: 0.25rem 0;
            user-select: none;
        }
        #ocr-preview {
            display: block;
            margin-top: 0.4rem;
            width: 100%;
            border: 1px solid #374151;
            border-radius: 4px;
            background: #000;
            image-rendering: pixelated;
        }
        #ocr-text {
            margin-top: 0.4rem;
            padding: 0.4rem 0.6rem;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 4px;
            font-size: 0.75rem;
            color: #9ca3af;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 6rem;
            overflow-y: auto;
        }
        #ocr-fields {
            display: none;
            margin-top: 0.4rem;
            padding: 0.4rem 0.6rem;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 4px;
            font-size: 0.75rem;
        }
        #ocr-fields table { width: 100%; border-collapse: collapse; }
        #ocr-fields td { padding: 2px 6px; vertical-align: top; }
        #ocr-fields td:first-child { color: #6b7280; width: 38%; }
        #ocr-fields td:last-child  { color: #93c5fd; font-family: monospace; }
    </style>
</head>
<body>
    <h1>Passport MRZ Scanner</h1>
    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="overlay"></canvas>
    </div>
    <canvas id="canvas" style="display:none"></canvas>
    <div id="message">Initializing…</div>

    <div id="perm-tip"></div>

    <div id="focus-controls">
        <div class="focus-row">
            <label for="focus-mode-select">Focus mode</label>
            <select id="focus-mode-select"></select>
        </div>
        <div class="focus-row" id="focus-dist-row" style="display:none">
            <label for="focus-range">Distance</label>
            <input type="range" id="focus-range" />
            <span id="focus-val">—</span>
        </div>
    </div>

    <details id="debug-section" open>
        <summary>OCR debug</summary>
        <canvas id="ocr-preview"></canvas>
        <pre id="ocr-text">—</pre>
        <pre id="ocr-lines" style="margin-top:0.4rem;padding:0.4rem 0.6rem;background:#0f1a0f;border:1px solid #374151;border-radius:4px;font-size:0.75rem;color:#4ade80;white-space:pre-wrap;word-break:break-all;max-height:5rem;overflow-y:auto;">—</pre>
        <div id="ocr-fields"></div>
    </details>

    <script src="vendor/mrz.js"></script>
    <script src="vendor/tesseract.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
