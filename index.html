<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MRZ Webcam Scanner</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 2rem; }
        video { width: 100%; max-width: 600px; border: 1px solid #ccc; }
        #message { margin-top: 1rem; }
    </style>
</head>
<body>
    <h1>Passport MRZ Scanner</h1>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none"></canvas>
    <div id="message">Point your camera at the passport MRZ</div>

    <!-- include MRZ parsing library and OCR engine -->
    <script src="https://cdn.jsdelivr.net/npm/mrz@5/dist/mrz.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
